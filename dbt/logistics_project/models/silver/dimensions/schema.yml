version: 2

models:

  - name: dim_carriers
    description: SCD Type 2 carrier dimension.

    columns:

      - name: carrier_sk
        tests:
          - unique
          - not_null

      - name: carrier_id
        tests:
          - not_null

      - name: carrier_name
        tests:
          - not_null

      - name: carrier_tier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Express
                  - Premium
                  - Standard
                  - Economy

      - name: service_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Express
                  - Premium
                  - Standard
                  - Economy

      - name: sla_target_pct
        tests:
          - not_null

      - name: effective_from
        tests:
          - not_null

      - name: effective_to
        tests:
          - not_null

      - name: is_current
        tests:
          - not_null

  - name: dim_customers
    description: Customer SCD Type 2 dimension.

    columns:

      - name: customer_sk
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: customer_name
        tests:
          - not_null

      - name: email
        tests:
          - not_null:
              config:
                where: "customer_sk != -1"

      - name: phone
        tests:
          - not_null:
              config:
                where: "customer_sk != -1"

      - name: customer_segment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Retail
                  - Business
                  - Enterprise
                  - Unknown

      - name: effective_from
        tests:
          - not_null

      - name: effective_to
        tests:
          - not_null

      - name: is_current
        tests:
          - not_null

  - name: dim_date
    description: Calendar dimension.

    columns:

      - name: date_key
        tests:
          - unique
          - not_null

      - name: full_date
        tests:
          - unique
          - not_null

      - name: year
        tests:
          - not_null

      - name: month
        tests:
          - not_null

      - name: quarter
        tests:
          - not_null

      - name: day_of_month
        tests:
          - not_null

  - name: dim_products
    description: Product master dimension.

    columns:

      - name: product_id
        tests:
          - unique
          - not_null

      - name: seller_id
        tests:
          - not_null

      - name: product_name
        tests:
          - not_null

      - name: category
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Electronics
                  - Fashion
                  - Grocery
                  - Home
                  - Beauty
                  - Sports

      - name: subcategory
        tests:
          - not_null

      - name: brand
        tests:
          - not_null

      - name: unit_cost
        tests:
          - not_null

      - name: unit_weight_kg
        tests:
          - not_null

  - name: dim_sellers
    description: Seller master dimension.

    columns:

      - name: seller_id
        tests:
          - unique
          - not_null

      - name: seller_name
        tests:
          - not_null

      - name: seller_tier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Premium
                  - Mid
                  - Long Tail

      - name: seller_region
        tests:
          - not_null

      - name: seller_category
        tests:
          - not_null

      - name: rating_score
        tests:
          - not_null

      - name: is_active
        tests:
          - not_null

  - name: dim_warehouses
    description: Warehouse master dimension.

    columns:

      - name: warehouse_id
        tests:
          - unique
          - not_null

      - name: warehouse_name
        tests:
          - unique
          - not_null

      - name: warehouse_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Tier 1
                  - Tier 2

      - name: region
        tests:
          - not_null

      - name: capacity_units
        tests:
          - not_null

      - name: warehouse_rating
        tests:
          - not_null